services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lofty-backend
    ports:
      - "8001:8000"
    environment:
      PORT: "8000"
      FRONTEND_ORIGIN: "http://localhost:5173"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lofty-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped